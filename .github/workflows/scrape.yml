name: Scrape GOV.UK apprenticeships

# Goal: run at exactly 09:00, 13:00 and 16:00 UK time, every day, all year.
#
# GitHub's cron only speaks UTC and does NOT follow British Summer Time, so a fixed
# UTC schedule would drift by an hour in summer. To stay locked to UK local time we
# fire at every UTC hour those targets *could* fall on (08/09, 12/13, 15/16), then a
# gate step checks the real Europe/London clock and lets only 09:00 / 13:00 / 16:00
# through. The "wrong" fires for the current season just exit in a second (free).
on:
  schedule:
    - cron: "0 8,9,12,13,15,16 * * *"
  workflow_dispatch: {}   # manual "run now" button in the GitHub Actions tab (always runs)

permissions:
  contents: write          # allow the job to commit the updated data files

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gate scheduled runs to 09:00 / 13:00 / 16:00 UK time
        id: gate
        run: |
          # Manual runs (workflow_dispatch) always proceed.
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Manual run — proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR=$(TZ=Europe/London date +%H)
          if [ "$HOUR" = "09" ] || [ "$HOUR" = "13" ] || [ "$HOUR" = "16" ]; then
            echo "UK time is ${HOUR}:00 — a scheduled slot, proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "UK time is ${HOUR}:00 — not a scheduled slot, skipping this fire."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run GOV.UK scraper (PowerShell)
        if: steps.gate.outputs.run == 'true'
        shell: pwsh
        run: ./scrape.ps1
        env:
          # Telegram notifications: add these as repo SECRETS (Settings → Secrets and variables → Actions → Secrets).
          # The bot token is sensitive — it must be a Secret, never committed to the repo.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Optional alternative — ntfy.sh topic as a repo Variable (not secret).
          NTFY_TOPIC: ${{ vars.NTFY_TOPIC }}

      - name: Commit updated data if changed
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name  "apprenticeship-bot"
          git config user.email "actions@github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "Auto-update apprenticeship data ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
